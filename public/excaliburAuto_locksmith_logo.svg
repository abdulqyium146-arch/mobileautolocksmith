<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Excalibur Auto Locksmiths">
  <title>Excalibur Auto Locksmiths</title>
  <defs>
    <filter id="emblem-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
    <clipPath id="shield-clip">
      <path d="M75,0 L150,0 L150,110 Q150,150 75,175 Q0,150 0,110 L0,0 Z"/>
    </clipPath>
  </defs>

  <!-- ══════════════ SHIELD EMBLEM ══════════════ -->
  <g transform="translate(60, 40)" filter="url(#emblem-shadow)">

    <!-- Shield body -->
    <path d="M75,0 L150,0 L150,110 Q150,150 75,175 Q0,150 0,110 L0,0 Z"
          fill="#f8f6f0" stroke="#0b0c2a" stroke-width="3"/>

    <!-- Shield inner border -->
    <path d="M80,8 L142,8 L142,108 Q142,144 75,168 Q8,144 8,108 L8,8 Z"
          fill="none" stroke="#0b0c2a" stroke-width="1.2" opacity="0.2"/>

    <!-- Red band -->
    <rect x="0" y="60" width="150" height="22"
          fill="#c0392b" opacity="0.9" clip-path="url(#shield-clip)"/>

    <!-- ── Sword blade ── -->
    <polygon points="75,12 78,70 72,70" fill="#8a8fa8" opacity="0.95"/>
    <!-- Blade highlight -->
    <line x1="75" y1="14" x2="75" y2="68"
          stroke="#d0d4e0" stroke-width="1" opacity="0.7"/>

    <!-- Crossguard -->
    <rect x="54" y="68" width="42" height="8" rx="4" fill="#c0392b"/>
    <circle cx="54" cy="72" r="5" fill="#c0392b"/>
    <circle cx="96" cy="72" r="5" fill="#c0392b"/>

    <!-- Handle -->
    <rect x="71" y="76" width="8" height="28" rx="3" fill="#0b0c2a"/>
    <line x1="71" y1="82" x2="79" y2="82" stroke="#8a8fa8" stroke-width="1.2" opacity="0.6"/>
    <line x1="71" y1="88" x2="79" y2="88" stroke="#8a8fa8" stroke-width="1.2" opacity="0.6"/>
    <line x1="71" y1="94" x2="79" y2="94" stroke="#8a8fa8" stroke-width="1.2" opacity="0.6"/>

    <!-- Pommel — key-ring shape -->
    <circle cx="75" cy="112" r="10" fill="#0b0c2a"/>
    <circle cx="75" cy="112" r="6"  fill="none" stroke="#c0392b" stroke-width="2"/>
    <!-- Key teeth on pommel -->
    <rect x="80" y="109" width="5" height="3" rx="1" fill="#c0392b"/>
    <rect x="80" y="114" width="4" height="2" rx="1" fill="#c0392b"/>

    <!-- Gold stars on red band -->
    <text x="75" y="74.5" text-anchor="middle"
          font-size="10" fill="#e2a800" opacity="0.95"
          font-family="serif">★  ★  ★</text>

    <!-- Key icon — bottom of shield -->
    <g transform="translate(75,148)" opacity="0.85">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#0b0c2a" stroke-width="2"/>
      <circle cx="0" cy="0" r="4" fill="#0b0c2a"/>
      <rect   x="6"  y="-1.5" width="14" height="3"   rx="1.5" fill="#0b0c2a"/>
      <rect   x="14" y="1.5"  width="2.5" height="4"  rx="1"   fill="#0b0c2a"/>
      <rect   x="18" y="1.5"  width="2"   height="3"  rx="1"   fill="#0b0c2a"/>
    </g>

  </g>
  <!-- ══════════════ END EMBLEM ══════════════ -->

  <!-- ══════════════ WORDMARK ══════════════ -->
  <g transform="translate(245, 55)">

    <!-- EXCALIBUR -->
    <text x="0" y="62"
          font-family="Cinzel, Georgia, serif"
          font-size="54" font-weight="900" letter-spacing="2"
          fill="#1a1a2e">EXCALIBUR</text>

    <!-- Red rule -->
    <rect x="0" y="74" width="400" height="2.5" rx="1.25" fill="#c0392b"/>

    <!-- AUTO -->
    <text x="2" y="103"
          font-family="Cinzel, Georgia, serif"
          font-size="22" font-weight="700" letter-spacing="8"
          fill="#c0392b">AUTO</text>

    <!-- Subtle rule -->
    <rect x="0" y="112" width="400" height="1" rx="0.5" fill="#0b0c2a" opacity="0.15"/>

    <!-- LOCKSMITHS -->
    <text x="0" y="155"
          font-family="Cinzel, Georgia, serif"
          font-size="38" font-weight="900" letter-spacing="5"
          fill="#1a1a2e">LOCKSMITHS</text>

    <!-- Tagline -->
    <text x="2" y="183"
          font-family="'Arial Narrow', Arial, sans-serif"
          font-size="13" font-weight="500" letter-spacing="3"
          fill="#555">TRUSTED · FAST · AVAILABLE 24/7</text>

    <!-- Sub-tagline -->
    <text x="2" y="208"
          font-family="Georgia, serif"
          font-size="11" font-weight="400"
          fill="#c0392b" opacity="0.8">— Your Security Is Our Priority —</text>

  </g>
  <!-- ══════════════ END WORDMARK ══════════════ -->

  <!-- Bottom accent bar -->
  <rect x="60"  y="235" width="560" height="3"   rx="1.5" fill="#c0392b" opacity="0.8"/>
  <rect x="60"  y="241" width="560" height="1"   rx="0.5" fill="#0b0c2a" opacity="0.12"/>

</svg>
